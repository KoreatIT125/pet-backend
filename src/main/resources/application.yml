spring:
  application:
    name: petmediscan-backend
  
  datasource:
    # Docker 컨테이너에서 실행 시: host.docker.internal 사용
    url: jdbc:mysql://host.docker.internal:3308/KIT125?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    # 로컬 개발 (gradlew bootRun): 192.168.2.15:3308 사용
    # url: jdbc:mysql://192.168.2.15:3308/KIT125?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: pet_user
    password: pet_pass123
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  
server:
  port: 8080

logging:
  level:
    com.example.demo: DEBUG

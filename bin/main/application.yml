spring:
  application:
    name: petmediscan-backend
  
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

  jwt:
    secret: ${JWT_SECRET}

  datasource:
    # Docker 컨테이너에서 실행 시: host.docker.internal 사용
    # url: jdbc:mysql://host.docker.internal:3308/KIT125?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    # 로컬 개발 (gradlew bootRun): 192.168.2.15:3308 사용
    # url: jdbc:mysql://192.168.2.15:3308/KIT125?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useHostsInPrivileges=false
    # username: pet_user
    # password: pet_pass123
    # driver-class-name: com.mysql.cj.jdbc.Driver

    H2-DataBase
      url:jdbc:h2:~/local
      driver-class-name:org.h2.Driver
      username:sa
      password:""

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  
server:
  port: 8097

logging:
  level:
    com.example.demo: DEBUG
